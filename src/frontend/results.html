<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - RepositórioUM</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tfidf-extra-filters {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }
        .tfidf-extra-filters h4 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: var(--primary-red);
        }
        .score-tag {
            display: inline-block;
            background: #fff0f0;
            color: var(--primary-red);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid #ffcccc;
        }
        .hidden {
            display: none !important;
        }

        /* Cartão de resultado */
        .result-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 18px;
            transition: box-shadow 0.2s;
        }
        .result-card:hover {
            box-shadow: 0 2px 12px rgba(0,0,0,0.09);
        }
        .result-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0 0 6px 0;
            line-height: 1.4;
        }
        .result-title a {
            color: #8b0000;
            text-decoration: none;
        }
        .result-title a:hover {
            text-decoration: underline;
        }
        .result-authors {
            font-size: 0.88rem;
            color: #555;
            margin: 0 0 10px 0;
        }
        .result-abstract {
            font-size: 0.92rem;
            color: #333;
            line-height: 1.6;
            margin: 0 0 14px 0;
        }
        .result-metadata {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.85rem;
            color: #666;
        }
        .result-metadata .pdf-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #8b0000;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid #ffcccc;
            padding: 2px 10px;
            border-radius: 4px;
            background: #fff0f0;
            transition: background 0.15s;
        }
        .result-metadata .pdf-link:hover {
            background: #ffe0e0;
        }
        .result-metadata .doi-tag {
            color: #888;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>
    <header class="results-header">
        <div class="header-content">
            <h2 class="mini-logo" style="cursor:pointer" onclick="window.location.href='/'"> <img src="/static/repositorium.png" alt="RepositórioUM" class="logo-img" width="100" height="52"></h2>
            <form action="#" class="search-box-top" onsubmit="handleTopSearch(event)">
                <input type="text" id="top-query" name="query" placeholder="Pesquisar...">
                <button type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
            <i class="fa-solid fa-circle-info search-info-icon"
            title="Pode usar operadores booleanos: AND, OR, NOT&#10;Ex: machine AND learning NOT deep">
            </i>
        </div>
    </header>

    <div class="results-layout">
        <aside class="filters-sidebar">
    <h3>Configurações</h3>
    <div class="filter-group">
        <label for="algorithm">
            Algoritmo de Pesquisa
            <i class="fa-solid fa-circle-info info-icon"
            title="Booleano: usa operadores AND/OR/NOT.
        TF-IDF Personalizado: usa pesos TF e IDF configuráveis.
        TF-IDF Sklearn: versão otimizada usando a biblioteca Scikit-learn.">
            </i>
        </label>
        <select id="algorithm" class="algo-select">
            <option value="boolean">Booleano</option>
            <option value="tfidf_custom">TF-IDF Personalizado</option>
            <option value="tfidf_sklearn">TF-IDF (Sklearn)</option>
        </select>
    </div>

    <div id="tfidf-custom-options" class="tfidf-extra-filters hidden">
        <h4>Pesos TF-IDF</h4>
        <div class="filter-group">
            <label>
                Esquema TF
                <i class="fa-solid fa-circle-info info-icon"
                title="Define como a frequência do termo é calculada no documento.">
                </i>
            </label>
            <div style="display:flex; align-items:center; gap:8px;">
                <select id="tf-weighting" class="algo-select">
                    <option value="raw">Raw Count (Frequência)</option>
                    <option value="log">Logarithmic (1 + log tf)</option>
                    <option value="binary">Binary (0 ou 1)</option>
                    <option value="augmented">Augmented</option>
                </select>

                <i class="fa-solid fa-circle-info info-icon"
                title="Raw: frequência normal.
            Log: reduz impacto de palavras repetidas.
            Binary: apenas presença ou ausência.
            Augmented: normaliza pela frequência máxima do documento.">
                </i>
            </div>
            </div>
        
        <div class="filter-group">
            <label>
                Esquema IDF
                <i class="fa-solid fa-circle-info info-icon"
                title="Define como a raridade dos termos é penalizada na coleção de documentos.">
                </i>
            </label>
            <div style="display:flex; align-items:center; gap:8px;">
                <select id="idf-weighting" class="algo-select">
                    <option value="standard">Standard IDF</option>
                    <option value="smooth">Smooth IDF</option>
                    <option value="probabilistic">Probabilistic IDF</option>
                </select>

                <i class="fa-solid fa-circle-info info-icon"
                title="Standard: IDF clássico.
            Smooth: evita divisões por zero.
            Probabilistic: penaliza termos muito frequentes.">
                </i>
            </div>
            </div>
    </div>

    <div class="filter-group">
        <label>Processamento de Texto</label>
        <div class="checkbox-group" style="display: flex; flex-direction: column; gap: 10px; margin-top: 5px;">
            <label class="checkbox-item">
                <input type="checkbox" id="stemming" checked onchange="gerirCheckboxes('stemming')">
                Stemming
                <i class="fa-solid fa-circle-info info-icon"
                    title="Reduz palavras ao seu radical. Ex: running → run">
                </i>
            </label>
            
            <label class="checkbox-item">
                <input type="checkbox" id="lematizacao" onchange="gerirCheckboxes('lematizacao')">
                Lematização
                <i class="fa-solid fa-circle-info info-icon"
                title="Converte palavras para a sua forma base linguística. Ex: better → good">
                </i>
            </label> <label class="checkbox-item">
                <input type="checkbox" id="stopwords" onchange="gerirCheckboxes('stopwords')">
                Remover Stopwords
                <i class="fa-solid fa-circle-info info-icon"
                title="Remove palavras muito frequentes e pouco relevantes como: de, a, o, and, the...">
                </i>
            </label>    
        </div>
    </div>

    <div class="filter-group">
        <label>Ano de Publicação</label>
        <div class="range-slider-container">
            <input type="range" id="year-min" min="1950" max="2026" value="1950">
            <input type="range" id="year-max" min="1950" max="2026" value="2026">
        </div>
        <div class="range-values">
            <span id="year-min-val">1950</span> - <span id="year-max-val">2026</span>
        </div>
    </div>
</aside>

        <main class="results-content">
            <div id="search-stats" class="search-stats">
                A carregar resultados...
            </div>
            <div id="results-container">
                <!-- Os resultados serão inseridos aqui via JS -->
            </div>
        </main>
    </div>

    <script>
        function gerirCheckboxes(idClicado) {
            const stemming = document.getElementById('stemming');
            const lematizacao = document.getElementById('lematizacao');
            const stopwords = document.getElementById('stopwords');

            // Se o utilizador ativou o Stemming, desliga obrigatoriamente a Lematização
            if (idClicado === 'stemming' && stemming.checked) {
                lematizacao.checked = false;
            }
            
            // Se o utilizador ativou a Lematização, desliga obrigatoriamente o Stemming
            if (idClicado === 'lematizacao' && lematizacao.checked) {
                stemming.checked = false;
            }

            // Se preferires que as Stopwords TAMBÉM sejam exclusivas (apenas UMA caixa ativa no total),
            // descomenta as linhas abaixo:
            
           // Se o utilizador ativou o Stemming, desliga obrigatoriamente a Lematização
            if (idClicado === 'stemming' && stemming.checked) {
                lematizacao.checked = false;
            }
            
            // Se o utilizador ativou a Lematização, desliga obrigatoriamente o Stemming
            if (idClicado === 'lematizacao' && lematizacao.checked) {
                stemming.checked = false;
            }
            
            // Dispara a pesquisa automaticamente para atualizar os resultados no ecrã
            triggerSearch();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('query');
            const method = urlParams.get('method') || 'tfidf_sklearn';
            
            // 1. FORÇAR APENAS O STEMMING NO INÍCIO (Desliga as outras caixas)
            document.getElementById('stemming').checked = true;
            document.getElementById('lematizacao').checked = false;
            document.getElementById('stopwords').checked = false;

            // 2. Se a URL trouxe parâmetros específicos de checkboxes (caso venham de um clique anterior)
            if (urlParams.has('stemming')) {
                document.getElementById('stemming').checked = urlParams.get('stemming') === 'true';
            }
            if (urlParams.has('lematizacao')) {
                document.getElementById('lematizacao').checked = urlParams.get('lematizacao') === 'true';
            }
            if (urlParams.has('stopwords')) {
                document.getElementById('stopwords').checked = urlParams.get('stopwords') === 'true';
            }

            if (query) {
                document.getElementById('top-query').value = query;
                document.getElementById('algorithm').value = method;
                toggleTfIdfOptions(method);
                performSearch(query, method);
            }

            const minSlider = document.getElementById('year-min');
            const maxSlider = document.getElementById('year-max');
            const minVal = document.getElementById('year-min-val');
            const maxVal = document.getElementById('year-max-val');

            minSlider.addEventListener('input', () => {
                if (parseInt(minSlider.value) > parseInt(maxSlider.value)) minSlider.value = maxSlider.value;
                minVal.textContent = minSlider.value;
            });

            maxSlider.addEventListener('input', () => {
                if (parseInt(maxSlider.value) < parseInt(minSlider.value)) maxSlider.value = minSlider.value;
                maxVal.textContent = maxSlider.value;
            });

            [minSlider, maxSlider].forEach(slider => {
                slider.addEventListener('change', () => triggerSearch());
            });

            document.getElementById('algorithm').addEventListener('change', function() {
                toggleTfIdfOptions(this.value);
                triggerSearch();
            });

            document.querySelectorAll('input[type="checkbox"], #tf-weighting, #idf-weighting').forEach(el => {
                el.addEventListener('change', () => triggerSearch());
            });
        });

        function toggleTfIdfOptions(method) {
            const optionsDiv = document.getElementById('tfidf-custom-options');
            if (method === 'tfidf_custom') {
                optionsDiv.classList.remove('hidden');
            } else {
                optionsDiv.classList.add('hidden');
            }
        }

        function handleTopSearch(event) {
            event.preventDefault();
            triggerSearch();
        }

        function triggerSearch() {
            const query = document.getElementById('top-query').value;
            const method = document.getElementById('algorithm').value;
            performSearch(query, method);
        }

        async function performSearch(query, method) {
            if (!query) return;

            const stats = document.getElementById('search-stats');
            const container = document.getElementById('results-container');

            stats.textContent = "A pesquisar...";

            const stemming    = document.getElementById('stemming').checked;
            const lematizacao = document.getElementById('lematizacao').checked;
            const stopwords   = document.getElementById('stopwords').checked;
            const yearMin     = document.getElementById('year-min').value;
            const yearMax     = document.getElementById('year-max').value;
            const tfWeighting  = document.getElementById('tf-weighting').value;
            const idfWeighting = document.getElementById('idf-weighting').value;

            const params = new URLSearchParams({
                query, method,
                year_min: yearMin,
                year_max: yearMax,
                stemming, lematizacao, stopwords,
                tf_weighting: tfWeighting,
                idf_weighting: idfWeighting
            });

            try {
                const response = await fetch(`http://127.0.0.1:8000/search?${params}`);
                const data = await response.json();

                const methodLabel = { boolean: 'Booleano', tfidf_custom: 'TF-IDF Personalizado', tfidf_sklearn: 'TF-IDF Sklearn' }[method] || method;
                stats.textContent = `Encontrados ${data.results.length} resultado(s) para "${query}" (${methodLabel})`;

                container.innerHTML = "";
                if (data.results.length === 0) {
                    container.innerHTML = "<p class='no-results'>Não foram encontrados documentos para esta pesquisa.</p>";
                    return;
                }

                data.results.forEach(doc => {
                    const card = document.createElement('div');
                    card.className = 'result-card';

                    // Título — usa o campo 'title' mapeado pela app.py
                    const title = doc.title && doc.title !== doc.doi
                        ? doc.title
                        : (doc.doi || 'Sem título');

                    // Abstract — mostra até 300 caracteres
                    const abstract = doc.abstract
                        ? doc.abstract.substring(0, 300) + (doc.abstract.length > 300 ? '...' : '')
                        : 'Sem resumo disponível.';

                    // Autores
                    let authorsText = '';
                    if (Array.isArray(doc.authors) && doc.authors.length > 0) {
                        authorsText = doc.authors.join(', ');
                    } else if (typeof doc.authors === 'string' && doc.authors) {
                        authorsText = doc.authors;
                    }

                    // Ano
                    const year = doc.year || 'N/A';

                    // Score
                    const scoreHtml = doc.score !== undefined
                        ? `<span class="score-tag">Score: ${doc.score.toFixed(4)}</span>`
                        : '';

                    // Link PDF
                    const pdfHtml = doc.link
                        ? `<a class="pdf-link" href="${doc.link}" target="_blank"><i class="fa-solid fa-file-pdf"></i> PDF</a>`
                        : '';

                    // DOI
                    const doiHtml = doc.doi
                        ? `<span class="doi-tag">DOI: ${doc.doi}</span>`
                        : '';

                    card.innerHTML = `
                        <h3 class="result-title"><a href="${doc.url || '#'}" target="_blank">${title}</a></h3>
                        ${authorsText ? `<p class="result-authors"><i class="fa-solid fa-user"></i> ${authorsText}</p>` : ''}
                        <p class="result-abstract">${abstract}</p>
                        <div class="result-metadata">
                            <span><i class="fa-solid fa-calendar"></i> ${year}</span>
                            ${scoreHtml}
                            ${pdfHtml}
                            ${doiHtml}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Erro na API:", error);
                stats.textContent = "Erro ao ligar ao servidor.";
                container.innerHTML = "<p>Verifica se o servidor FastAPI está a correr em http://127.0.0.1:8000</p>";
            }
        }
    </script>
</body>
</html>
