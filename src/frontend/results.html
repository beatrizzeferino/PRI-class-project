<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - RepositórioUM</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="results-header">
        <div class="header-content">
            <h2 class="mini-logo" onclick="window.location.href='/'">Repositório<span>UM</span></h2>
            <form action="/" class="search-box-top" onsubmit="search(event)">
                <input type="text" name="query" value="Processamento de Linguagem Natural">
                <button type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
            <i class="fa-solid fa-circle-info search-info-icon"
            title="Pode usar operadores booleanos: AND, OR, NOT&#10;Ex: machine AND learning NOT deep">
            </i>
        </div>
    </header>

    <div class="results-layout">
        <aside class="filters-sidebar">
            <h3>Filtros</h3>
            
           <div style="display: flex; align-items: center; gap: 6px;">
                <select id="algorithm">
                    <option value="tfidf_custom">TF-IDF Personalizado</option>
                    <option value="sklearn">Scikit-Learn</option>
                    <option value="boolean">Booleano</option>
                </select>

                <i class="fa-solid fa-circle-info"
                title="TF-IDF → relevância por frequência de termos&#10;Scikit-Learn → implementação otimizada&#10;Booleano → usa AND, OR, NOT">
                </i>
            </div>

            <div class="filter-group">
                <label>Processamento [cite: 57]</label>
                <div class="checkbox-item"><input type="checkbox" checked> Stemming</div>
                <div class="checkbox-item"><input type="checkbox"> Lematização</div>
                <div class="checkbox-item"><input type="checkbox" checked> Stop Words</div>
            </div>

            <div class="filter-group">
                <label>Ano de Publicação: <span id="year-display">1950 - 2026</span></label>
                <div class="range-slider-container">
                    <input type="range" min="1950" max="2026" value="1950" id="year-min" class="slider">
                    <input type="range" min="1950" max="2026" value="2026" id="year-max" class="slider">
                </div>
            </div>

            <div class="edu-box">
                <small><i class="fa-solid fa-circle-info"></i> O score representa a similaridade do cosseno entre a sua query e o documento. [cite: 62]</small>
            </div>
        </aside>

        <main class="results-main">
            <p class="results-count">A carregar resultados do RepositóriUM...</p>
            
            <section id="results-list" class="results-list">
                
            </section>
        </main>
    </div>

    <script>
        // 1. Lógica Visual: Barra de Intervalo de Anos
        const minSlider = document.getElementById('year-min');
        const maxSlider = document.getElementById('year-max');
        const display = document.getElementById('year-display');

        function updateYears() {
            let v1 = parseInt(minSlider.value);
            let v2 = parseInt(maxSlider.value);
            if (v1 > v2) [v1, v2] = [v2, v1];
            display.innerText = `${v1} - ${v2}`;
        }

        minSlider.oninput = updateYears;
        maxSlider.oninput = updateYears;

        // 2. Lógica de Pesquisa e API
        
        // Captura os elementos uma única vez
        const resultsContainer = document.getElementById("results-list");
        const countElem = document.querySelector('.results-count');

        // LER PARÂMETROS DA URL (Executado ao abrir a página)
        const urlParams = new URLSearchParams(window.location.search);
        const queryParam = urlParams.get('query');
        const methodParam = urlParams.get('method');

        // Se a página abrir com query na URL (vinda da index), pesquisa logo
        if (queryParam) {
            document.querySelector('input[name="query"]').value = queryParam;
            if(methodParam) document.getElementById("algorithm").value = methodParam;
            performSearch(queryParam, methodParam || "tfidf_custom");
        }

    // Função que vai buscar os dados à API Python
    async function performSearch(query, method) {
        // 1. Captura os elementos do DOM
        const resultsContainer = document.getElementById("results-list");
        const countElem = document.querySelector('.results-count');
        const yearMin = document.getElementById('year-min').value;
        const yearMax = document.getElementById('year-max').value;

        // Feedback visual enquanto carrega
        resultsContainer.innerHTML = "<p>A carregar resultados...</p>";

        try {
            // 2. Faz o pedido à API com todos os parâmetros
            const response = await fetch(`http://127.0.0.1:8000/search?query=${encodeURIComponent(query)}&method=${method}&year_min=${yearMin}&year_max=${yearMax}`);
            const data = await response.json();

            // 3. Limpa o contentor de resultados
            resultsContainer.innerHTML = "";

            // 4. Verifica se há resultados
            if (!data.results || data.results.length === 0) {
                countElem.innerText = `0 resultados encontrados para "${query}"`;
                resultsContainer.innerHTML = "<div class='no-results'>Nenhum documento encontrado para os filtros selecionados.</div>";
                return;
            }

            // 5. Atualiza o contador
            countElem.innerText = `Encontrados ${data.results.length} resultados`;

            // 6. Itera sobre os resultados e cria os cartões (Cards)
            data.results.forEach(item => {
                // Garantir que autores é uma string legível
                let authorsStr = "Autores desconhecidos";
                if (item.authors) {
                    authorsStr = Array.isArray(item.authors) ? item.authors.join(", ") : item.authors;
                }

                // Criar o template do card
                const card = `
                    <article class="result-card">
                        <span class="score-badge">Score: ${item.score ? item.score.toFixed(2) : '1.0'}</span>
                        <h3 class="result-title">
                            <a href="${item.url || '#'}" target="_blank">${item.title || 'Sem título'}</a>
                        </h3>
                        <p class="result-authors">${authorsStr}</p>
                        <p class="result-snippet">${item.abstract ? item.abstract.substring(0, 300) + '...' : 'Sem resumo disponível.'}</p>
                        <div class="result-footer">
                            <span><i class="fa-regular fa-calendar"></i> ${item.year || 'N/A'}</span>
                            <a href="${item.document_link || '#'}" class="pdf-link" target="_blank">
                                <i class="fa-solid fa-file-pdf"></i> PDF Full Text
                            </a>
                        </div>
                    </article>
                `;
                
                // Inserir no container
                resultsContainer.innerHTML += card;
            });

        } catch (error) {
            console.error("Erro na pesquisa:", error);
            resultsContainer.innerHTML = "<p style='color:red'>Erro ao ligar ao servidor. Verifica se o app.py está a correr.</p>";
        }
    }

        // Fazer pesquisa automática ao largar o slider (evento 'change')
        minSlider.addEventListener('change', () => {
            const query = document.querySelector('input[name="query"]').value;
            const method = document.getElementById("algorithm").value;
            performSearch(query, method);
        });

        maxSlider.addEventListener('change', () => {
            const query = document.querySelector('input[name="query"]').value;
            const method = document.getElementById("algorithm").value;
            performSearch(query, method);
        });

        // Função chamada pelo formulário da própria página de resultados
        function search(event) {
            event.preventDefault();
            const query = document.querySelector('input[name="query"]').value;
            const method = document.getElementById("algorithm").value;
            performSearch(query, method);
        }

        // Faz a pesquisa automaticamente quando mudas o algoritmo no menu lateral
        document.getElementById("algorithm").addEventListener("change", function() {
            const query = document.querySelector('input[name="query"]').value;
            const method = this.value;
            performSearch(query, method);
        });

        // Faz a pesquisa automaticamente quando mudas os filtros de processamento (opcional)
        document.querySelectorAll('.checkbox-item input').forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const query = document.querySelector('input[name="query"]').value;
                const method = document.getElementById("algorithm").value;
                performSearch(query, method);
            });
        });
    </script>
</body>
</html>
